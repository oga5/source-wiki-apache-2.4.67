<html><head><meta charset="utf-8"><meta name="source-wiki-viewer-version" content="5"><title>Related: include/mod_core.h</title><link rel="stylesheet" href="../../styles.css"></head><body><h1>Related pages</h1><p>include/mod_core.h</p><ul><li><a href="../../wiki/include/mod_core.h.html" target="wiki-view">Wiki: include/mod_core.h</a></li><li><a href="../../source/include/httpd.h.html" target="source-view">Include: httpd.h</a></li><li><a href="../../source/include/util_filter.h.html" target="source-view">Include: util_filter.h</a></li></ul><script>
(function() {
  function notifyParent() {
    if (parent === window) return;
    parent.postMessage({type: "frame-location", frame: window.name || "", href: window.location.href}, "*");
  }
  document.addEventListener("click", function(event) {
    const link = event.target.closest("a[data-panel]");
    if (!link || parent === window) return;
    parent.postMessage({type: "source-link", panel: link.dataset.panel}, "*");
  });
  window.addEventListener("load", notifyParent);
  window.addEventListener("hashchange", notifyParent);
})();
</script></body></html>
