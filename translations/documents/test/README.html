<!doctype html>
<html><head><meta charset="utf-8"><meta name="source-wiki-viewer-version" content="3"><title>test/README</title><link rel="stylesheet" href="../../../styles.css"></head><body><h1>Japanese translation</h1><p><code>test/README</code></p><pre>このディレクトリには、Apacheの様々な機能をテストするための有用なテストコードが含まれています。これらは開発者専用であるため、公開リリース時には削除される可能性があります。</pre><script>
(function() {
  function notifyParent() {
    if (parent === window) return;
    parent.postMessage({type: "frame-location", frame: window.name || "", href: window.location.href}, "*");
  }
  window.addEventListener("load", notifyParent);
  window.addEventListener("hashchange", notifyParent);
})();
</script></body></html>
