<html><head><meta charset="utf-8"><meta name="source-wiki-viewer-version" content="5"><title>docs/manual/style/scripts/MINIFY</title><link rel="stylesheet" href="../../../../../styles.css"></head><body><header class="source-header">docs/manual/style/scripts/MINIFY</header><pre class="source-code"><div class="code-line" id="L1"><a class="line-no" href="#L1">1</a><span>#!/bin/sh</span></div><div class="code-line" id="L2"><a class="line-no" href="#L2">2</a><span></span></div><div class="code-line" id="L3"><a class="line-no" href="#L3">3</a><span>(echo &#x27;// see prettify.js for copyright, license and expanded version&#x27;; python -mrjsmin &lt;prettify.js) &gt;prettify.min.js</span></div><div class="code-line" id="L4"><a class="line-no" href="#L4">4</a><span></span></div><div class="code-line" id="L5"><a class="line-no" href="#L5">5</a><span># needs python and rjsmin installed</span></div></pre><script>parent.postMessage({"type": "source-page", "panel": "panels/docs/manual/style/scripts/MINIFY.html"}, "*");</script><script>
(function() {
  function notifyParent() {
    if (parent === window) return;
    parent.postMessage({type: "frame-location", frame: window.name || "", href: window.location.href}, "*");
  }
  document.addEventListener("click", function(event) {
    const link = event.target.closest("a[data-panel]");
    if (!link || parent === window) return;
    parent.postMessage({type: "source-link", panel: link.dataset.panel}, "*");
  });
  window.addEventListener("load", notifyParent);
  window.addEventListener("hashchange", notifyParent);
})();
</script></body></html>
