<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="source-wiki-viewer-version" content="5"><title>ap_set_module_config</title><link rel="stylesheet" href="../styles.css"></head><body><h1>Multiple definitions: <code>ap_set_module_config</code></h1><ul><li><a href="../source/include/http_config.h.html#L552" target="source-view">include/http_config.h:552 (macro)</a></li><li><a href="../source/server/util_debug.c.html#L221" target="source-view">server/util_debug.c:221 (function)</a></li></ul><script>
(function() {
  function notifyParent() {
    if (parent === window) return;
    parent.postMessage({type: "frame-location", frame: window.name || "", href: window.location.href}, "*");
  }
  document.addEventListener("click", function(event) {
    const link = event.target.closest("a[data-panel]");
    if (!link || parent === window) return;
    parent.postMessage({type: "source-link", panel: link.dataset.panel}, "*");
  });
  window.addEventListener("load", notifyParent);
  window.addEventListener("hashchange", notifyParent);
})();
</script></body></html>
