<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="source-wiki-viewer-version" content="5"><title>HAVE_UNC_PATHS</title><link rel="stylesheet" href="../styles.css"></head><body><h1>Multiple definitions: <code>HAVE_UNC_PATHS</code></h1><ul><li><a href="../source/os/os2/os.h.html#L35" target="source-view">os/os2/os.h:35 (macro)</a></li><li><a href="../source/os/win32/os.h.html#L56" target="source-view">os/win32/os.h:56 (macro)</a></li></ul><script>
(function() {
  function notifyParent() {
    if (parent === window) return;
    parent.postMessage({type: "frame-location", frame: window.name || "", href: window.location.href}, "*");
  }
  document.addEventListener("click", function(event) {
    const link = event.target.closest("a[data-panel]");
    if (!link || parent === window) return;
    parent.postMessage({type: "source-link", panel: link.dataset.panel}, "*");
  });
  window.addEventListener("load", notifyParent);
  window.addEventListener("hashchange", notifyParent);
})();
</script></body></html>
