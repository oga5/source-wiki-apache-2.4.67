<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="source-wiki-viewer-version" content="5"><title>ap_prelinked_module_symbols</title><link rel="stylesheet" href="../styles.css"></head><body><h1>Multiple definitions: <code>ap_prelinked_module_symbols</code></h1><ul><li><a href="../source/os/netware/modules.c.html#L71" target="source-view">os/netware/modules.c:71 (variable)</a></li><li><a href="../source/os/win32/modules.c.html#L40" target="source-view">os/win32/modules.c:40 (variable)</a></li></ul><script>
(function() {
  function notifyParent() {
    if (parent === window) return;
    parent.postMessage({type: "frame-location", frame: window.name || "", href: window.location.href}, "*");
  }
  document.addEventListener("click", function(event) {
    const link = event.target.closest("a[data-panel]");
    if (!link || parent === window) return;
    parent.postMessage({type: "source-link", panel: link.dataset.panel}, "*");
  });
  window.addEventListener("load", notifyParent);
  window.addEventListener("hashchange", notifyParent);
})();
</script></body></html>
