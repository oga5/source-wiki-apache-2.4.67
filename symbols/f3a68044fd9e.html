<html><head><meta charset="utf-8"><meta name="source-wiki-viewer-version" content="5"><title>set_timeout</title><link rel="stylesheet" href="../styles.css"></head><body><h1>Multiple definitions: <code>set_timeout</code></h1><ul><li><a href="../source/modules/metadata/mod_ident.c.html#L251" target="source-view">modules/metadata/mod_ident.c:251 (function)</a></li><li><a href="../source/server/core.c.html#L3246" target="source-view">server/core.c:3246 (function)</a></li></ul><script>
(function() {
  function notifyParent() {
    if (parent === window) return;
    parent.postMessage({type: "frame-location", frame: window.name || "", href: window.location.href}, "*");
  }
  document.addEventListener("click", function(event) {
    const link = event.target.closest("a[data-panel]");
    if (!link || parent === window) return;
    parent.postMessage({type: "source-link", panel: link.dataset.panel}, "*");
  });
  window.addEventListener("load", notifyParent);
  window.addEventListener("hashchange", notifyParent);
})();
</script></body></html>
