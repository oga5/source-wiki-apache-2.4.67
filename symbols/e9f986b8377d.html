<html><head><meta charset="utf-8"><meta name="source-wiki-viewer-version" content="5"><title>init_child</title><link rel="stylesheet" href="../styles.css"></head><body><h1>Multiple definitions: <code>init_child</code></h1><ul><li><a href="../source/modules/loggers/mod_log_config.c.html#L1540" target="source-view">modules/loggers/mod_log_config.c:1540 (function)</a></li><li><a href="../source/modules/mappers/mod_rewrite.c.html#L4864" target="source-view">modules/mappers/mod_rewrite.c:4864 (function)</a></li></ul><script>
(function() {
  function notifyParent() {
    if (parent === window) return;
    parent.postMessage({type: "frame-location", frame: window.name || "", href: window.location.href}, "*");
  }
  document.addEventListener("click", function(event) {
    const link = event.target.closest("a[data-panel]");
    if (!link || parent === window) return;
    parent.postMessage({type: "source-link", panel: link.dataset.panel}, "*");
  });
  window.addEventListener("load", notifyParent);
  window.addEventListener("hashchange", notifyParent);
})();
</script></body></html>
