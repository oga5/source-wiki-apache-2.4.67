<!doctype html>
<html><head><meta charset="utf-8"><meta name="source-wiki-viewer-version" content="5"><title>example</title><link rel="stylesheet" href="../styles.css"></head><body><h1>Multiple definitions: <code>example</code></h1><ul><li><a href="../source/docs/manual/developer/mod_example_1.c.html#L37" target="source-view">docs/manual/developer/mod_example_1.c:37 (variable)</a></li><li><a href="../source/docs/manual/developer/mod_example_2.c.html#L130" target="source-view">docs/manual/developer/mod_example_2.c:130 (variable)</a></li></ul><script>
(function() {
  function notifyParent() {
    if (parent === window) return;
    parent.postMessage({type: "frame-location", frame: window.name || "", href: window.location.href}, "*");
  }
  document.addEventListener("click", function(event) {
    const link = event.target.closest("a[data-panel]");
    if (!link || parent === window) return;
    parent.postMessage({type: "source-link", panel: link.dataset.panel}, "*");
  });
  window.addEventListener("load", notifyParent);
  window.addEventListener("hashchange", notifyParent);
})();
</script></body></html>
