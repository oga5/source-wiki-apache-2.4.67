<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="source-wiki-viewer-version" content="5"><title>handle_headers</title><link rel="stylesheet" href="../styles.css"></head><body><h1>Multiple definitions: <code>handle_headers</code></h1><ul><li><a href="../source/modules/aaa/mod_authnz_fcgi.c.html#L409" target="source-view">modules/aaa/mod_authnz_fcgi.c:409 (function)</a></li><li><a href="../source/modules/proxy/mod_proxy_fcgi.c.html#L543" target="source-view">modules/proxy/mod_proxy_fcgi.c:543 (function)</a></li></ul><script>
(function() {
  function notifyParent() {
    if (parent === window) return;
    parent.postMessage({type: "frame-location", frame: window.name || "", href: window.location.href}, "*");
  }
  document.addEventListener("click", function(event) {
    const link = event.target.closest("a[data-panel]");
    if (!link || parent === window) return;
    parent.postMessage({type: "source-link", panel: link.dataset.panel}, "*");
  });
  window.addEventListener("load", notifyParent);
  window.addEventListener("hashchange", notifyParent);
})();
</script></body></html>
