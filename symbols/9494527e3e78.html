<html><head><meta charset="utf-8"><meta name="source-wiki-viewer-version" content="5"><title>dav_core_props</title><link rel="stylesheet" href="../styles.css"></head><body><h1>Multiple definitions: <code>dav_core_props</code></h1><ul><li><a href="../source/modules/dav/main/props.c.html#L199" target="source-view">modules/dav/main/props.c:199 (variable)</a></li><li><a href="../source/modules/dav/main/std_liveprop.c.html#L41" target="source-view">modules/dav/main/std_liveprop.c:41 (variable)</a></li></ul><script>
(function() {
  function notifyParent() {
    if (parent === window) return;
    parent.postMessage({type: "frame-location", frame: window.name || "", href: window.location.href}, "*");
  }
  document.addEventListener("click", function(event) {
    const link = event.target.closest("a[data-panel]");
    if (!link || parent === window) return;
    parent.postMessage({type: "source-link", panel: link.dataset.panel}, "*");
  });
  window.addEventListener("load", notifyParent);
  window.addEventListener("hashchange", notifyParent);
})();
</script></body></html>
