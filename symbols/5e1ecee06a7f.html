<html><head><meta charset="utf-8"><meta name="source-wiki-viewer-version" content="5"><title>cache</title><link rel="stylesheet" href="../styles.css"></head><body><h1>Multiple definitions: <code>cache</code></h1><ul><li><a href="../source/modules/cache/mod_cache.c.html#L2698" target="source-view">modules/cache/mod_cache.c:2698 (variable)</a></li><li><a href="../source/modules/mappers/mod_rewrite.c.html#L386" target="source-view">modules/mappers/mod_rewrite.c:386 (struct)</a></li></ul><script>
(function() {
  function notifyParent() {
    if (parent === window) return;
    parent.postMessage({type: "frame-location", frame: window.name || "", href: window.location.href}, "*");
  }
  document.addEventListener("click", function(event) {
    const link = event.target.closest("a[data-panel]");
    if (!link || parent === window) return;
    parent.postMessage({type: "source-link", panel: link.dataset.panel}, "*");
  });
  window.addEventListener("load", notifyParent);
  window.addEventListener("hashchange", notifyParent);
})();
</script></body></html>
