<html><head><meta charset="utf-8"><meta name="source-wiki-viewer-version" content="5"><title>dispatch</title><link rel="stylesheet" href="../styles.css"></head><body><h1>Multiple definitions: <code>dispatch</code></h1><ul><li><a href="../source/modules/md/md_store_fs.c.html#L503" target="source-view">modules/md/md_store_fs.c:503 (function)</a></li><li><a href="../source/modules/proxy/mod_proxy_fcgi.c.html#L596" target="source-view">modules/proxy/mod_proxy_fcgi.c:596 (function)</a></li></ul><script>
(function() {
  function notifyParent() {
    if (parent === window) return;
    parent.postMessage({type: "frame-location", frame: window.name || "", href: window.location.href}, "*");
  }
  document.addEventListener("click", function(event) {
    const link = event.target.closest("a[data-panel]");
    if (!link || parent === window) return;
    parent.postMessage({type: "source-link", panel: link.dataset.panel}, "*");
  });
  window.addEventListener("load", notifyParent);
  window.addEventListener("hashchange", notifyParent);
})();
</script></body></html>
